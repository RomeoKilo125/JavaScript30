<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Key Detection</title>
    <script type="text/javascript" src="./cornify.js"></script>
    <link rel="icon" href="https://fav.farm/🔥" />
  </head>

  <body>
    <script>
      const keysPressed = [];
      const secretCode = "rossking";
      window.addEventListener("keyup", (e) => {
        keysPressed.push(e.key);
        keysPressed.splice(
          -secretCode.length - 1,
          keysPressed.length - secretCode.length,
        );
        if (keysPressed.join("") === secretCode) {
          cornify_add();
        }
      });
    </script>
  </body>
</html>
